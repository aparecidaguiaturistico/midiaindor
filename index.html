
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mídia Indoor - Barbearia</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #040814; 
            height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
            color: #fff;
        }

        /* Fundo estático para não pesar no processador da TV Box */
        .background-static {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #040814 0%, #0a1025 100%);
            z-index: -1;
        }

        #display-wrapper {
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease-in-out;
        }

        #ad-image {
            width: 100%; height: 100%;
            object-fit: cover;
            display: none;
        }

        /* Cor sólida em vez de blur para garantir que apareça na TV Box */
        .app-container {
            max-width: 90%;
            background: #0a0f1e; 
            padding: 50px;
            border-radius: 30px;
            border: 2px solid #e2b96f;
            text-align: center;
            display: none;
        }

        .section-label {
            font-size: 1.2rem;
            color: #e2b96f;
            letter-spacing: 8px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 4vw;
            line-height: 1.4;
            margin-bottom: 25px;
        }

        .quote-reference {
            font-size: 1.8vw;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div class="background-static"></div>
    <div id="display-wrapper">
        <img id="ad-image" src="" alt="">
        <div class="app-container" id="verse-card">
            <div class="section-label">📖 Palavra do Dia</div>
            <p class="quote-text" id="quote-text"></p>
            <span class="quote-reference" id="quote-ref"></span>
        </div>
    </div>

    <script>
        // Lista de 10 Anúncios (Certifique-se que as imagens estejam na mesma pasta)
        const ads = [
            'https://i.imgur.com/mZcCdND.jpeg', 'https://i.imgur.com/JJdZs5i.png', 'https://i.imgur.com/QkjKCNv.png', 'https://i.imgur.com/jyKicc5.png', 'https://i.imgur.com/mZcCdND.jpeg',
            'https://i.imgur.com/Kxuxem8.png', 'https://i.imgur.com/mZcCdND.jpeg', 'https://i.imgur.com/QkjKCNv.png', 'anuncio9.jpg', 'anuncio10.jpg'
        ];

        // 50 Frases Bíblicas
        const verses = [
            { text: "Tudo posso naquele que me fortalece.", ref: "Filipenses 4:13" },
            { text: "O Senhor é o meu pastor, nada me faltará.", ref: "Salmos 23:1" },
            { text: "Deus é o nosso refúgio e fortaleza.", ref: "Salmos 46:1" },
            { text: "O amor de Deus nunca falha.", ref: "1 João 4:8" },
            { text: "Confia no Senhor de todo o teu coração.", ref: "Provérbios 3:5" },
            { text: "A alegria do Senhor é a nossa força.", ref: "Neemias 8:10" },
            { text: "Lâmpada para os meus pés é tua palavra.", ref: "Salmos 119:105" },
            { text: "O Senhor te guardará de todo o mal.", ref: "Salmos 121:7" },
            { text: "Se Deus é por nós, quem será contra nós?", ref: "Romanos 8:31" },
            { text: "Eu sou o caminho, a verdade e a vida.", ref: "João 14:6" },
            { text: "Grandes coisas fez o Senhor por nós.", ref: "Salmos 126:3" },
            { text: "Onde há o Espírito do Senhor, aí há liberdade.", ref: "2 Coríntios 3:17" },
            { text: "Mil cairão ao teu lado, mas tu não serás atingido.", ref: "Salmos 91:7" },
            { text: "Busquem primeiro o Reino de Deus.", ref: "Mateus 6:33" },
            { text: "Toda ferramenta preparada contra ti não prosperará.", ref: "Isaías 54:17" },
            { text: "Deus é fiel.", ref: "1 Coríntios 1:9" },
            { text: "A tua graça me basta.", ref: "2 Coríntios 12:9" },
            { text: "O choro pode durar uma noite, mas a alegria vem pela manhã.", ref: "Salmos 30:5" },
            { text: "Coragem! Eu venci o mundo.", ref: "João 16:33" },
            { text: "O Senhor é a minha luz e a minha salvação.", ref: "Salmos 27:1" },
            { text: "Deus é amor.", ref: "1 João 4:16" },
            { text: "A fé é a certeza daquilo que esperamos.", ref: "Hebreus 11:1" },
            { text: "Não temas, porque eu sou contigo.", ref: "Isaías 41:10" },
            { text: "Deus supre todas as nossas necessidades.", ref: "Filipenses 4:19" },
            { text: "Nada é impossível para Deus.", ref: "Lucas 1:37" },
            { text: "Seja forte e corajoso.", ref: "Josué 1:9" },
            { text: "O Senhor pelejará por vós.", ref: "Êxodo 14:14" },
            { text: "A paz de Deus excede todo o entendimento.", ref: "Filipenses 4:7" },
            { text: "Em Deus faremos proezas.", ref: "Salmos 60:12" },
            { text: "O coração alegre aformoseia o rosto.", ref: "Provérbios 15:13" },
            { text: "Tudo tem o seu tempo determinado.", ref: "Eclesiastes 3:1" },
            { text: "Até aqui nos ajudou o Senhor.", ref: "1 Samuel 7:12" },
            { text: "A palavra do Senhor permanece para sempre.", ref: "1 Pedro 1:25" },
            { text: "Provai e vede que o Senhor é bom.", ref: "Salmos 34:8" },
            { text: "Dá força ao cansado.", ref: "Isaías 40:29" },
            { text: "O Senhor renova as nossas forças.", ref: "Salmos 103:5" },
            { text: "Sê fiel até a morte e dar-te-ei a coroa da vida.", ref: "Apocalipse 2:10" },
            { text: "Os que esperam no Senhor voarão como águias.", ref: "Isaías 40:31" },
            { text: "Deus é o meu socorro bem presente.", ref: "Salmos 46:1" },
            { text: "Clama a mim e responder-te-ei.", ref: "Jeremias 33:3" },
            { text: "A oração do justo pode muito.", ref: "Tiago 5:16" },
            { text: "Tudo coopera para o bem dos que amam a Deus.", ref: "Romanos 8:28" },
            { text: "Deus nunca nos abandona.", ref: "Hebreus 13:5" },
            { text: "O Senhor te abençoe e te guarde.", ref: "Números 6:24" },
            { text: "Bem-aventurados os limpos de coração.", ref: "Mateus 5:8" },
            { text: "O Senhor está perto dos que têm o coração quebrantado.", ref: "Salmos 34:18" },
            { text: "A palavra de Deus é viva e eficaz.", ref: "Hebreus 4:12" },
            { text: "Cantai ao Senhor um cântico novo.", ref: "Salmos 98:1" },
            { text: "Em tudo dai graças.", ref: "1 Tessalonicenses 5:18" },
            { text: "O Senhor é bom para todos.", ref: "Salmos 145:9" }
        ];

        const wrapper = document.getElementById('display-wrapper');
        const adImg = document.getElementById('ad-image');
        const verseCard = document.getElementById('verse-card');
        const qText = document.getElementById('quote-text');
        const qRef = document.getElementById('quote-ref');

        let adIndex = 0;
        let isShowingAd = true;

        function updateDisplay() {
            wrapper.style.opacity = 0;
            setTimeout(() => {
                if (isShowingAd) {
                    adImg.src = ads[adIndex] + '?t=' + new Date().getTime(); 
                    adImg.style.display = 'block';
                    verseCard.style.display = 'none';
                    adIndex = (adIndex + 1) % ads.length;
                    isShowingAd = false;
                    setTimeout(updateDisplay, 8000);
                } else {
                    const v = verses[Math.floor(Math.random() * verses.length)];
                    qText.innerText = `"${v.text}"`;
                    qRef.innerText = v.ref;
                    adImg.style.display = 'none';
                    verseCard.style.display = 'block';
                    isShowingAd = true;
                    setTimeout(updateDisplay, 10000);
                }
                wrapper.style.opacity = 1;
            }, 1000);
        }
        updateDisplay();
    </script>
</body>
</html>
